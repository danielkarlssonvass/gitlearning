name: Salesforce CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Write private key to file
        env:
          PRIVATE_KEY: ${{ secrets.SF_PRIVATE_KEY }}
        run: printf '%s' "${PRIVATE_KEY}" > server.key

      - name: Authenticate to Salesforce
        run: sf org login jwt --client-id ${{ secrets.SF_CLIENT_ID }} --jwt-key-file server.key --username ${{ secrets.SF_USERNAME }} --instance-url https://orgfarm-9d3692b4df-dev-ed.develop.my.salesforce-setup.com/ --alias devgitalias

      - name: Validate metadata (dry run)
        if: github.event_name == 'pull_request'
        run: sf project deploy validate --source-dir force-app --target-org devgitalias --test-level RunLocalTests

      - name: Deploy metadata
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: sf project deploy start --source-dir force-app --target-org devgitalias --test-level RunLocalTests